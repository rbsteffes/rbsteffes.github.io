<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="Adults">Adult #:</label><input id="Adults">
        <label for="Kids">Child #:</label><input id="Kids" value="0">
        <button type="button" onclick="showPrice()">Total</button>

        <div id="Total"></div>
        

        <script>
            const adultPrice = 8.75, kidPrice = 2.50, taxRate = .07;
            function showPrice()
            {
                let adultQty = parseFloat(document.getElementById("Adults").value),
                    kidQty = parseFloat(document.getElementById("Kids").value);

                    // Adults can go alone, kids can't
                    if(adultQty <= 0 || Number.isNaN(adultQty))
                    {
                        alert("Must have 1 or more adults");
                        return;
                    }
                    else{
                        // Check for kid quantity entered
                        if( Number.isNaN(kidQty))
                            kidQty = 0;

                        let myPrice = (adultQty * adultPrice) + (kidQty *kidPrice);
                        myPrice *= 1+taxRate;
                        let myResult = document.getElementById("Total");
                        myResult.innerText = "$" + myPrice;
                    }
                
                    
                
            }
        </script>
        
</body>
</html>
